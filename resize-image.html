<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resize Image Online Free | Free Tools Hub</title>

<meta name="description" content="Resize image online free with touch resize and custom width & height.">

<link rel="icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#07111f,#132238,#1d3557);
padding:20px;
color:white;
}

.container{
max-width:750px;
margin:auto;
background:#132238;
padding:30px;
border-radius:28px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
font-size:34px;
margin-bottom:10px;
}

.top-text{
text-align:center;
color:#d0dae5;
margin-bottom:25px;
}

.upload-box{
background:#0b1727;
border:2px dashed #3d5a80;
padding:30px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
background:#102033;
}

.upload-box i{
font-size:55px;
color:#00b4ff;
margin-bottom:15px;
}

input[type="file"]{
display:none;
}

.editor{
margin-top:30px;
text-align:center;
display:none;
}

#imageBox{
position:relative;
display:inline-block;
border:2px solid #00b4ff;
border-radius:12px;
overflow:hidden;
touch-action:none;
}

#image{
display:block;
max-width:100%;
width:300px;
}

.resize-handle{
width:22px;
height:22px;
background:#00b4ff;
position:absolute;
right:0;
bottom:0;
cursor:nwse-resize;
border-radius:50%;
}

.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.controls input{
padding:14px;
border:none;
border-radius:12px;
background:#0b1727;
color:white;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:14px;
background:#00b4ff;
color:white;
font-size:17px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
background:#0095d9;
transform:scale(1.02);
}

.info{
margin-top:20px;
background:#0b1727;
padding:18px;
border-radius:14px;
line-height:1.8;
color:#d0dae5;
}

canvas{
display:none;
}

@media(max-width:700px){

.container{
padding:22px;
}

h1{
font-size:28px;
}

.controls{
grid-template-columns:1fr;
}

#image{
width:240px;
}

}

</style>

</head>

<body>

<div class="container">

<h1><i class="fa-solid fa-expand"></i> Resize Image</h1>

<p class="top-text">
Resize image with touch, drag and custom size.
</p>

<label class="upload-box" for="fileInput">

<i class="fa-solid fa-cloud-arrow-up"></i>

<h2>Upload Image</h2>

<p>Click to select image</p>

</label>

<input type="file" id="fileInput" accept="image/*">

<div class="editor" id="editor">

<div id="imageBox">

<img id="image">

<div class="resize-handle" id="handle"></div>

</div>

<div class="controls">

<input type="number" id="widthInput" placeholder="Width">

<input type="number" id="heightInput" placeholder="Height">

</div>

<button onclick="applyResize()">
<i class="fa-solid fa-wand-magic-sparkles"></i>
 Apply Resize
</button>

<button onclick="downloadImage()">
<i class="fa-solid fa-download"></i>
 Download Image
</button>

<div class="info" id="info">

Image size will appear here.

</div>

</div>

<canvas id="canvas"></canvas>

</div>

<script>

const fileInput = document.getElementById('fileInput');
const image = document.getElementById('image');
const editor = document.getElementById('editor');
const widthInput = document.getElementById('widthInput');
const heightInput = document.getElementById('heightInput');
const info = document.getElementById('info');

let currentWidth = 300;
let currentHeight = 300;

fileInput.addEventListener('change', function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

image.src = event.target.result;

editor.style.display = 'block';

image.onload = function(){

currentWidth = image.naturalWidth;
currentHeight = image.naturalHeight;

image.style.width = currentWidth + 'px';

widthInput.value = currentWidth;
heightInput.value = currentHeight;

updateInfo();

}

}

reader.readAsDataURL(file);

});

function applyResize(){

currentWidth = widthInput.value;
currentHeight = heightInput.value;

image.style.width = currentWidth + 'px';
image.style.height = currentHeight + 'px';

updateInfo();

}

function updateInfo(){

info.innerHTML = `
Original Width: ${image.naturalWidth}px <br>
Original Height: ${image.naturalHeight}px <br><br>

Current Width: ${currentWidth}px <br>
Current Height: ${currentHeight}px
`;

}

function downloadImage(){

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = currentWidth;
canvas.height = currentHeight;

ctx.drawImage(image,0,0,currentWidth,currentHeight);

const link = document.createElement('a');

link.download = 'resized-image.png';

link.href = canvas.toDataURL();

link.click();

}

/* TOUCH + DRAG RESIZE */

const handle = document.getElementById('handle');

let isResizing = false;

handle.addEventListener('mousedown', startResize);
handle.addEventListener('touchstart', startResize);

function startResize(e){

e.preventDefault();

isResizing = true;

document.addEventListener('mousemove', resize);
document.addEventListener('mouseup', stopResize);

document.addEventListener('touchmove', resize);
document.addEventListener('touchend', stopResize);

}

function resize(e){

if(!isResizing) return;

let clientX = e.touches ? e.touches[0].clientX : e.clientX;
let clientY = e.touches ? e.touches[0].clientY : e.clientY;

const rect = image.getBoundingClientRect();

currentWidth = clientX - rect.left;
currentHeight = clientY - rect.top;

if(currentWidth < 50) currentWidth = 50;
if(currentHeight < 50) currentHeight = 50;

image.style.width = currentWidth + 'px';
image.style.height = currentHeight + 'px';

widthInput.value = Math.floor(currentWidth);
heightInput.value = Math.floor(currentHeight);

updateInfo();

}

function stopResize(){

isResizing = false;

document.removeEventListener('mousemove', resize);
document.removeEventListener('mouseup', stopResize);

document.removeEventListener('touchmove', resize);
document.removeEventListener('touchend', stopResize);

}

</script>

</body>
</html>

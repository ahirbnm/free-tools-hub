<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resize Tool</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:30px;
    overflow-x:hidden;
}

/* CARD LAYOUT FIX */
.container{
    width:100%;
    max-width:750px;
    background:#0f1b2d;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* HEADER */
header{
    text-align:center;
    color:white;
    font-size:26px;
    font-weight:bold;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    color:#9fb3c8;
    font-size:14px;
    margin-bottom:20px;
}

/* UPLOAD BOX FIX (NO BREAK) */
.upload-box{
    border:2px dashed #3b82f6;
    background:#111c2e;
    padding:35px;
    text-align:center;
    border-radius:15px;
    cursor:pointer;
    color:white;
    transition:0.3s;
}

.upload-box:hover{
    background:#16263d;
}

.upload-box input{
    display:none;
}

/* INPUTS */
.controls{
    margin-top:15px;
    display:grid;
    gap:10px;
}

.controls input{
    padding:10px;
    border-radius:8px;
    border:1px solid #2c3e50;
    background:#111c2e;
    color:white;
}

/* BUTTON */
.btn{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#00a8ff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#0090dd;
}

/* OUTPUT */
.output{
    margin-top:20px;
    text-align:center;
}

.output img{
    max-width:100%;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

/* INFO BOX */
.info{
    margin-top:25px;
    background:#111c2e;
    padding:15px;
    border-radius:12px;
    color:#cbd5e1;
}

.info h3{
    color:white;
}

/* FIX OVERFLOW */
html, body{
    overflow-x:hidden;
}
</style>
</head>

<body>

<div class="container">

<header>📷 Image Resize Tool</header>
<div class="sub">Resize Your Images Online Instantly</div>

<!-- UPLOAD -->
<div class="upload-box" id="dropArea">
    📤 Click OR Drag Image Here
    <input type="file" id="fileInput" accept="image/*">
</div>

<!-- SIZE INPUT -->
<div class="controls">
    <input type="number" id="width" placeholder="Enter Width (px)">
    <input type="number" id="height" placeholder="Enter Height (px)">
</div>

<button class="btn" onclick="resizeImage()">Resize Image</button>

<div class="output" id="output"></div>

<!-- HOW TO USE -->
<div class="info">
<h3>📌 How to Use</h3>
<ul>
<li>Select or drag image</li>
<li>Enter width & height</li>
<li>Click Resize button</li>
<li>Download result</li>
</ul>
</div>

<!-- FEATURES -->
<div class="info">
<h3>⚡ Features</h3>
<ul>
<li>✔ Fast resizing</li>
<li>✔ No quality loss</li>
<li>✔ Drag & drop support</li>
<li>✔ Works offline</li>
</ul>
</div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const dropArea = document.getElementById("dropArea");

/* CLICK FIX */
dropArea.addEventListener("click", ()=> fileInput.click());

/* DRAG DROP FIX */
dropArea.addEventListener("dragover",(e)=>{
    e.preventDefault();
});

dropArea.addEventListener("drop",(e)=>{
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
});

function resizeImage(){

    const file = fileInput.files[0];
    if(!file){
        alert("Please select image");
        return;
    }

    const width = document.getElementById("width").value;
    const height = document.getElementById("height").value;

    if(!width || !height){
        alert("Enter width & height");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){

        const img = new Image();
        img.src = reader.result;

        img.onload = function(){

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = width;
            canvas.height = height;

            ctx.drawImage(img,0,0,width,height);

            const resized = canvas.toDataURL("image/png");

            const output = document.getElementById("output");
            output.innerHTML = "";

            const newImg = document.createElement("img");
            newImg.src = resized;

            const btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = "Download Image";

            btn.onclick = ()=>{
                const a = document.createElement("a");
                a.href = resized;
                a.download = "resized-image.png";
                a.click();
            };

            output.appendChild(newImg);
            output.appendChild(btn);
        };
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>

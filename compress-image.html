<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Compress Image Online Free | Free Tools Hub</title>

<meta name="description" content="Compress images online for free without losing quality. Reduce image file size easily.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.container{
background:white;
color:black;
width:100%;
max-width:500px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
font-size:30px;
margin-bottom:10px;
}

p{
font-size:14px;
margin-bottom:20px;
color:#444;
}

.upload-box{
border:2px dashed #777;
padding:30px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
background:#f3f3f3;
transform:scale(1.02);
}

#preview{
margin-top:20px;
}

#preview img{
max-width:100%;
border-radius:10px;
margin-top:10px;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#203a43;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#0f2027;
}

.info{
margin-top:15px;
font-size:14px;
color:#333;
}

.progress{
width:100%;
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:15px;
display:none;
}

.bar{
height:100%;
width:0%;
background:green;
}

</style>

</head>
<body>

<div class="container">

<h1>🖼 Compress Image</h1>

<p>Reduce image size online for free without losing quality.</p>

<div class="upload-box" id="uploadBox">
Click Or Drag Image Here

<input type="file" id="fileInput" accept="image/*" hidden>
</div>

<div id="preview"></div>

<div class="info" id="info"></div>

<div class="progress" id="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="compressImage()">Compress & Download</button>

</div>

<script>

const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");

let selectedFile;

uploadBox.onclick = () => {
fileInput.click();
};

uploadBox.addEventListener("dragover",(e)=>{
e.preventDefault();
uploadBox.style.background="#eee";
});

uploadBox.addEventListener("dragleave",()=>{
uploadBox.style.background="";
});

uploadBox.addEventListener("drop",(e)=>{
e.preventDefault();
selectedFile = e.dataTransfer.files[0];
showPreview(selectedFile);
});

fileInput.addEventListener("change",(e)=>{
selectedFile = e.target.files[0];
showPreview(selectedFile);
});

function showPreview(file){

const preview = document.getElementById("preview");
const info = document.getElementById("info");

preview.innerHTML="";

let img = document.createElement("img");

img.src = URL.createObjectURL(file);

preview.appendChild(img);

let sizeKB = (file.size/1024).toFixed(2);

info.innerHTML = "Original Size: " + sizeKB + " KB";
}

function compressImage(){

if(!selectedFile){
alert("Please select image");
return;
}

const progress = document.getElementById("progress");
const bar = document.getElementById("bar");

progress.style.display="block";

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();

img.src = e.target.result;

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

bar.style.width="70%";

canvas.toBlob(function(blob){

bar.style.width="100%";

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "compressed-image.jpg";

a.click();

let newSize = (blob.size/1024).toFixed(2);

document.getElementById("info").innerHTML +=
"<br>Compressed Size: " + newSize + " KB";

}, "image/jpeg", 0.5);

};

};

reader.readAsDataURL(selectedFile);

}

</script>

</body>
</html>

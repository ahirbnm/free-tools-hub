<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Free Tools Hub</title>
<style>
body{
font-family:Poppins,sans-serif;
background:#07111f;
color:white;
padding:40px;
}
.container{
max-width:700px;
margin:auto;
background:#132238;
padding:30px;
border-radius:20px;
}
input,textarea{
width:100%;
padding:14px;
margin-top:12px;
margin-bottom:20px;
border:none;
border-radius:12px;
background:#0b1727;
color:white;
}
button{
padding:14px 30px;
background:#00bcd4;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>Contact Us</h1>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="6" placeholder="Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>

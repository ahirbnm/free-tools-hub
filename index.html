<!DOCTYPE html>
<html>
<head>
  <title>Free Tools Hub</title>
<meta name="google-site-verification" content="ruQfkWuOiZdsdSa2L8GmqC7PviLBIJ3OL0spssYhlz8" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<title>Free Tools Hub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

header{padding:30px}
h1{font-size:35px}

.box{
background:white;
color:black;
width:90%;
max-width:450px;
margin:30px auto;
padding:25px;
border-radius:15px;
}

.upload{
border:2px dashed #888;
padding:25px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.upload:hover{
background:#f1f1f1;
transform:scale(1.03);
}

#preview img{
width:60px;
margin:5px;
border-radius:6px;
}

/* 🔥 ZOOM BUTTON */
button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:10px;
background:#2c5364;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#203a43;
}

/* progress */
.progress{
height:10px;
background:#ddd;
margin-top:10px;
border-radius:5px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:green;
}

.count{
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>🚀 Free Tools Hub</h1>
<p>Smart Image to PDF Converter</p>
</header>

<div class="box">

<div class="upload" id="dropArea">
👉 Click OR Drag Images Here
<input type="file" id="file" multiple accept="image/*" hidden>
</div>

<div class="count" id="count">No images selected</div>

<div id="preview"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="convert()">🚀 Convert to PDF</button>

</div>

<script>

let filesList = [];

let fileInput = document.getElementById("file");
let dropArea = document.getElementById("dropArea");

dropArea.onclick = () => fileInput.click();

fileInput.addEventListener("change", (e)=>{
handleFiles(e.target.files);
});

/* 🔥 DRAG DROP FIX */
dropArea.addEventListener("dragover",(e)=>{
e.preventDefault();
dropArea.style.background="#eee";
});

dropArea.addEventListener("dragleave",()=>{
dropArea.style.background="";
});

dropArea.addEventListener("drop",(e)=>{
e.preventDefault();
handleFiles(e.dataTransfer.files);
});

/* 🔥 MULTI IMAGE FIX */
function handleFiles(files){
filesList = Array.from(files);

let preview=document.getElementById("preview");
let count=document.getElementById("count");

preview.innerHTML="";
count.innerHTML=filesList.length+" images selected";

filesList.forEach(file=>{
let reader=new FileReader();

reader.onload=(e)=>{
let img=document.createElement("img");
img.src=e.target.result;
preview.appendChild(img);
}

reader.readAsDataURL(file);
});
}

/* 🔥 PDF CONVERT */
async function convert(){
if(filesList.length===0){
alert("Pehle images select karo!");
return;
}

const { jsPDF } = window.jspdf;
let pdf=new jsPDF();
let bar=document.getElementById("bar");

for(let i=0;i<filesList.length;i++){

let reader=new FileReader();

await new Promise(resolve=>{
reader.onload=(e)=>{

if(i!==0) pdf.addPage();

pdf.addImage(e.target.result,'JPEG',10,10,180,160);

bar.style.width=((i+1)/filesList.length)*100+"%";

resolve();
};

reader.readAsDataURL(filesList[i]);
});
}

pdf.save("final.pdf");
}

</script>

</body>
</html>

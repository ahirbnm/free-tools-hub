<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker | Free Tools Hub</title>
<meta name="description" content="Pick colors and get HEX code instantly online.">
<link rel="icon" type="image/png" href="logo.png">

<style>
body{
font-family:Arial;
background:#07111f;
color:white;
padding:20px;
text-align:center;
}

.box{
max-width:500px;
margin:auto;
background:#132238;
padding:25px;
border-radius:20px;
}

input{
width:100%;
height:60px;
border:none;
margin-top:20px;
border-radius:10px;
cursor:pointer;
}

h2{
margin-top:20px;
background:#0b1727;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>
<div class="box">
<h1>🎨 Color Picker</h1>

<p>Select a color below</p>

<input type="color" id="picker">

<h2 id="hex">#000000</h2>
</div>

<script>
document.getElementById('picker').addEventListener('input', function(){
document.getElementById('hex').innerText = this.value;
document.body.style.background = this.value;
});
</script>

</body>
</html>

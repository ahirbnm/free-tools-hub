<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced PDF to JPG Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#eef2f7;
}

header{
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container{
    max-width:900px;
    margin:20px auto;
    padding:20px;
}

/* UPLOAD BOX */
.upload-area{
    border:3px dashed #007bff;
    border-radius:15px;
    background:white;
    padding:40px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.upload-area:hover{
    background:#f0f8ff;
}

.upload-area.dragover{
    background:#d9ecff;
    border-color:#0056b3;
}

.upload-area input{
    display:none;
}

.upload-text{
    font-size:18px;
    color:#555;
}

/* BUTTON */
button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* PROGRESS */
#progress{
    margin-top:10px;
    height:10px;
    background:#ddd;
    border-radius:5px;
    overflow:hidden;
    display:none;
}

#bar{
    height:100%;
    width:0%;
    background:#28a745;
}

/* OUTPUT */
.output{
    margin-top:20px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:10px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:5px;
}

.download-btn{
    margin-top:5px;
    width:100%;
    padding:8px;
    background:#28a745;
}
</style>
</head>

<body>

<header>PDF to JPG Converter Pro</header>

<div class="container">

<div class="upload-area" id="uploadArea">
    <div class="upload-text">
        📤 Drag & Drop PDF here OR Click to Upload
    </div>
    <input type="file" id="fileInput" accept="application/pdf">
</div>

<button onclick="convertPDF()">Convert PDF</button>

<div id="progress">
    <div id="bar"></div>
</div>

<div class="output" id="output"></div>

</div>

<script>

const uploadArea = document.getElementById("uploadArea");
const fileInput = document.getElementById("fileInput");

uploadArea.addEventListener("click", () => fileInput.click());

uploadArea.addEventListener("dragover", (e)=>{
    e.preventDefault();
    uploadArea.classList.add("dragover");
});

uploadArea.addEventListener("dragleave", ()=>{
    uploadArea.classList.remove("dragover");
});

uploadArea.addEventListener("drop", (e)=>{
    e.preventDefault();
    uploadArea.classList.remove("dragover");
    fileInput.files = e.dataTransfer.files;
});

function updateProgress(value){
    document.getElementById("progress").style.display="block";
    document.getElementById("bar").style.width=value+"%";
}

function convertPDF(){

    const file = fileInput.files[0];
    if(!file){
        alert("Select PDF first");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(){

        const typed = new Uint8Array(this.result);

        pdfjsLib.getDocument(typed).promise.then(async function(pdf){

            const output = document.getElementById("output");
            output.innerHTML = "";

            let total = pdf.numPages;

            for(let i=1;i<=total;i++){

                updateProgress((i/total)*100);

                let page = await pdf.getPage(i);

                let scale = 1.8;
                let viewport = page.getViewport({scale:scale});

                let canvas = document.createElement("canvas");
                let ctx = canvas.getContext("2d");

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({
                    canvasContext:ctx,
                    viewport:viewport
                }).promise;

                let imgData = canvas.toDataURL("image/jpeg");

                let card = document.createElement("div");
                card.className="card";

                let img = document.createElement("img");
                img.src = imgData;

                let btn = document.createElement("button");
                btn.className="download-btn";
                btn.innerText="Download JPG";

                btn.onclick = function(){
                    let a = document.createElement("a");
                    a.href = imgData;
                    a.download = "page-"+i+".jpg";
                    a.click();
                }

                card.appendChild(img);
                card.appendChild(btn);

                output.appendChild(card);
            }

            updateProgress(100);

            setTimeout(()=>{
                document.getElementById("progress").style.display="none";
            },1000);

        });
    }

    reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>

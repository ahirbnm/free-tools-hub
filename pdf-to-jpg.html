<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF to JPG</title>
<link rel="icon" href="logo.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

<style>
body{font-family:Arial;background:#07111f;color:white;padding:20px;text-align:center}
.box{max-width:600px;margin:auto;background:#132238;padding:25px;border-radius:20px}
input,button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px}
button{background:#00b4ff;color:white}
canvas{margin-top:10px;max-width:100%}

.info{margin-top:15px;background:#0b1727;padding:15px;border-radius:10px;text-align:left}
.info h2{color:#00b4ff}
</style>
</head>

<body>
<div class="box">
<h1>📄 PDF to JPG</h1>

<input type="file" id="file" accept="application/pdf">
<button onclick="convert()">Convert</button>

<div id="out"></div>

<div class="info">
<h2>How To Use</h2>
<p>PDF upload करो और convert दबाओ।</p>

<h2>What It Does</h2>
<p>PDF pages को images में बदलता है।</p>

<h2>Benefits</h2>
<p>✔ Study material<br>✔ Sharing easy<br>✔ No software needed</p>
</div>
</div>

<script>
function convert(){
let f=document.getElementById('file').files[0];
let r=new FileReader();

r.onload=function(){
let data=new Uint8Array(this.result);

pdfjsLib.getDocument(data).promise.then(pdf=>{
for(let i=1;i<=pdf.numPages;i++){
pdf.getPage(i).then(page=>{
let c=document.createElement('canvas');
let ctx=c.getContext('2d');

let vp=page.getViewport({scale:1.5});
c.width=vp.width;
c.height=vp.height;

page.render({canvasContext:ctx,viewport:vp});

document.getElementById('out').appendChild(c);
});
}
});
}

r.readAsArrayBuffer(f);
}
</script>
</body>
</html>

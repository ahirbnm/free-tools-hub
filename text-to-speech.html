<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text To Speech | Free Tools Hub</title>
<meta name="description" content="Convert text into speech online free tool.">
<link rel="icon" type="image/png" href="logo.png">

<style>
body{
font-family:Arial;
background:#07111f;
color:white;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:#132238;
padding:25px;
border-radius:20px;
}

textarea,button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
}

textarea{
height:180px;
}

button{
background:#00b4ff;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>
<div class="box">
<h1>🔊 Text To Speech</h1>

<textarea id="text" placeholder="Type something here..."></textarea>

<button onclick="speakText()">Speak</button>
<button onclick="stopSpeech()">Stop</button>
</div>

<script>
function speakText(){
let text = document.getElementById('text').value;

if(text.trim() === ""){
alert("Please enter text");
return;
}

let speech = new SpeechSynthesisUtterance(text);
speech.rate = 1;
speech.pitch = 1;
window.speechSynthesis.speak(speech);
}

function stopSpeech(){
window.speechSynthesis.cancel();
}
</script>

</body>
</html>

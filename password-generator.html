<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | Free Tools Hub</title>
<meta name="description" content="Generate strong secure passwords online free.">
<link rel="icon" type="image/png" href="logo.png">
<style>
body{font-family:Arial;background:#07111f;color:white;padding:20px}
.box{max-width:600px;margin:auto;background:#132238;padding:25px;border-radius:20px}
input,button{width:100%;padding:14px;margin-top:15px;border:none;border-radius:10px}
button{background:#00b4ff;color:white;font-weight:bold}
.result{background:#0b1727;padding:15px;border-radius:10px;margin-top:15px;word-break:break-all}
</style>
</head>
<body>
<div class="box">
<h1>🔐 Password Generator</h1>
<p>Create strong secure passwords instantly.</p>

<input type="number" id="length" placeholder="Password Length" value="12">
<button onclick="generatePassword()">Generate Password</button>

<div class="result" id="result">Your password will appear here</div>
</div>

<script>
function generatePassword(){
let chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%';
let length=document.getElementById('length').value;
let pass='';
for(let i=0;i<length;i++){
pass+=chars.charAt(Math.floor(Math.random()*chars.length));
}
document.getElementById('result').innerText=pass;
}
</script>
</body>
</html>
